<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680" role="img" aria-label="Accessories">
  <defs><pattern id="twill" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#000000" stroke-width="6" opacity="0.05"/>
    </pattern></defs>
  <rect width="900" height="680" fill="#b08a6a"/>
  <rect width="900" height="680" fill="url(#twill)"/>

  <!-- selvedge stripe -->
  <rect x="0" y="0" width="10" height="680" fill="#d99a2b"/>

  <!-- grain-line marker (textile cut symbol) -->
  <g stroke="#1d2347" stroke-width="2" fill="none" opacity="0.55">
    <line x1="450" y1="204" x2="450" y2="421.6"/>
    <path d="M441 218 L450 204 L459 218"/>
    <path d="M441 407.6 L450 421.6 L459 407.6"/>
  </g>

  <!-- mill-ticket strip -->
  <rect x="0" y="585" width="900" height="95" fill="#1d2347"/>
  <rect x="0" y="585" width="10" height="95" fill="#d99a2b"/>
  <text x="34" y="628.5" font-family="'Fraunces', Georgia, serif" font-size="31" font-weight="600" fill="#f7f4ec">Accessories</text>
  <text x="34" y="659.5" font-family="'Spline Sans Mono', monospace" font-size="18" letter-spacing="2" fill="#f7f4ec" opacity="0.8">ACC · WRAPS & MORE</text>
</svg>