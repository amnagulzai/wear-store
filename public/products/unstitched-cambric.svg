<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" role="img" aria-label="Cambric 2-Piece">
  <defs><pattern id="twill" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#000000" stroke-width="6" opacity="0.05"/>
    </pattern></defs>
  <rect width="800" height="1000" fill="#c8b78f"/>
  <rect width="800" height="1000" fill="url(#twill)"/>

  <!-- selvedge stripe -->
  <rect x="0" y="0" width="10" height="1000" fill="#d99a2b"/>

  <!-- grain-line marker (textile cut symbol) -->
  <g stroke="#1d2347" stroke-width="2" fill="none" opacity="0.55">
    <line x1="400" y1="300" x2="400" y2="620"/>
    <path d="M391 314 L400 300 L409 314"/>
    <path d="M391 606 L400 620 L409 606"/>
  </g>

  <!-- mill-ticket strip -->
  <rect x="0" y="860" width="800" height="140" fill="#1d2347"/>
  <rect x="0" y="860" width="10" height="140" fill="#d99a2b"/>
  <text x="34" y="926" font-family="'Fraunces', Georgia, serif" font-size="45" font-weight="600" fill="#f7f4ec">Cambric 2-Piece</text>
  <text x="34" y="970" font-family="'Spline Sans Mono', monospace" font-size="26" letter-spacing="2" fill="#f7f4ec" opacity="0.8">WS-2406 · 100% CAMBRIC</text>
</svg>